<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background: navy rounded square -->
  <rect width="512" height="512" rx="112" fill="#0f1f35"/>

  <!-- Tree trunk -->
  <rect x="226" y="390" width="60" height="52" rx="10" fill="#7a4a22"/>

  <!-- Tree: 3 tiers, darkest at base, lightest at top -->
  <!-- Bottom tier -->
  <polygon points="256,208 380,390 132,390" fill="#164d28"/>
  <!-- Middle tier -->
  <polygon points="256,148 332,295 180,295" fill="#1b6133"/>
  <!-- Top tier -->
  <polygon points="256,96 308,210 204,210" fill="#21773e"/>

  <!-- Ornaments: red, cream, blue, white -->
  <!-- Red — left, middle band -->
  <circle cx="196" cy="310" r="23" fill="#b92e2e"/>
  <rect x="193" y="287" width="6" height="10" rx="3" fill="#c9a84c"/>

  <!-- Cream — right, upper-middle -->
  <circle cx="314" cy="266" r="20" fill="#f5f0e8"/>
  <rect x="311" y="246" width="6" height="9" rx="3" fill="#c9a84c"/>

  <!-- Blue — left, lower -->
  <circle cx="210" cy="358" r="20" fill="#2471a3"/>
  <rect x="207" y="338" width="6" height="9" rx="3" fill="#c9a84c"/>

  <!-- White — right, lower -->
  <circle cx="312" cy="348" r="21" fill="#f0f0f0"/>
  <rect x="309" y="327" width="6" height="9" rx="3" fill="#c9a84c"/>

  <!-- Gold star (5-pointed), centered at 256,72, outer r=32, inner r=14 -->
  <polygon
    points="256,40 264,63 288,63 270,78 277,101 256,87 235,101 242,78 224,63 248,63"
    fill="#c9a84c"
  />

</svg>
